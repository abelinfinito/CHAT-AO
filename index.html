<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chatbot AO</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background-color: #343541;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 250px;
      background-color: #202123;
      padding: 10px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      left: 0;
      top: 0;
      transition: transform 0.3s ease;
    }

    #chat {
      margin-left: 250px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: #40414f;
      padding: 20px;
      width: calc(100% - 250px);
      transition: margin-left 0.3s ease;
    }

    #mensagens {
      flex-grow: 1;
      overflow-y: auto;
      padding-right: 10px;
    }

    .mensagem {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 10px;
      max-width: 80%;
      line-height: 1.5;
    }

    .user { background-color: #0e7c9f; align-self: flex-end; }
    .bot { background-color: #555; align-self: flex-start; }

    #entrada-container {
      display: flex;
      gap: 10px;
      padding-top: 15px;
      border-top: 1px solid #555;
      flex-wrap: wrap;
    }

    #entrada {
      flex-grow: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      width: 100%;
    }

    button, input[type="file"] {
      padding: 10px 16px;
      background-color: #10a37f;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { background-color: #0f8b6e; }

    .active { font-weight: bold; color: #10a37f; }

    .edit-btn, .delete-btn {
      margin-left: 10px;
      cursor: pointer;
      color: #ff6666;
      font-size: 14px;
    }

    .edit-btn:hover { color: #ffaaaa; }
    .delete-btn:hover { color: #ff3333; }

    #imagem-upload { display: none; }

    /* Botão hamburguer */
    #toggleSidebar {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      background-color: #10a37f;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 5px;
      z-index: 999;
      font-size: 18px;
      cursor: pointer;
    }

    @media screen and (max-width: 768px) {
      #sidebar {
        transform: translateX(-100%);
        z-index: 998;
        width: 70%;
      }

      #sidebar.mostrar {
        transform: translateX(0);
      }

      #chat {
        margin-left: 0;
        width: 100%;
        padding: 70px 10px 20px;
      }

      #toggleSidebar {
        display: block;
      }

      #mensagens {
        max-height: 60vh;
        overflow-y: auto;
        padding-right: 5px;
      }

      .mensagem {
        max-width: 95%;
        font-size: 14px;
        margin-bottom: 10px;
        word-break: break-word;
      }

      .mensagem img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      #entrada-container {
        flex-direction: column;
        align-items: stretch;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <button id="toggleSidebar" onclick="alternarSidebar()">☰</button>

  <div id="sidebar">
    <h2>Conversas</h2>
    <button onclick="novaConversa()">Nova conversa</button>
    <ul id="listaConversas"></ul>
  </div>

  <div id="chat">
    <div id="mensagens"></div>
    <div id="entrada-container">
      <input type="text" id="entrada" placeholder="Escreva aqui..." />
      <button onclick="enviarMensagem()">Enviar</button>
      <button onclick="document.getElementById('imagem-upload').click()">📷 Enviar Imagem</button>
      <input type="file" id="imagem-upload" accept="image/*" onchange="enviarImagem()">
    </div>
  </div>

  <script>
    let conversas = JSON.parse(localStorage.getItem("conversas")) || [{ nome: "Conversa 1", mensagens: [] }];
    let conversaAtual = JSON.parse(localStorage.getItem("conversaAtual")) || 0;

    function salvarConversas() {
      localStorage.setItem("conversas", JSON.stringify(conversas));
      localStorage.setItem("conversaAtual", JSON.stringify(conversaAtual));
    }

    function novaConversa() {
      conversas.push({ nome: `Nova conversa`, mensagens: [] });
      conversaAtual = conversas.length - 1;
      document.getElementById("mensagens").innerHTML = "";
      salvarConversas();
      atualizarListaConversas();
    }

    function renomearConversa(index) {
      let novoNome = prompt("Digite o novo nome da conversa:");
      if (novoNome) {
        conversas[index].nome = novoNome;
        salvarConversas();
        atualizarListaConversas();
      }
    }

    function excluirConversa(index) {
      if (confirm(`Deseja excluir "${conversas[index].nome}"?`)) {
        conversas.splice(index, 1);
        if (conversas.length === 0) novaConversa();
        conversaAtual = Math.max(conversaAtual - 1, 0);
        salvarConversas();
        atualizarListaConversas();
        carregarConversa(conversaAtual);
      }
    }

    async function enviarMensagem() {
      const input = document.getElementById("entrada");
      const texto = input.value.trim();
      if (texto === "") return;

      input.value = "";

      const mensagens = document.getElementById("mensagens");
      mensagens.innerHTML += `<div class="mensagem user">${texto}</div>`;

      const resposta = await chamarOpenAI(texto);
      mensagens.innerHTML += `<div class="mensagem bot">${resposta}</div>`;

      conversas[conversaAtual].mensagens.push({ user: texto, bot: resposta });
      salvarConversas();
      atualizarListaConversas();
    }

    async function chamarOpenAI(texto) {
      const apiKey = "SUA_CHAVE_AQUI"; // Troque pela sua chave
      const url = "https://api.openai.com/v1/chat/completions";

      const historico = conversas[conversaAtual].mensagens.flatMap(m => [
        { role: "user", content: m.user },
        { role: "assistant", content: m.bot }
      ]).concat({ role: "user", content: texto });

      const resposta = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: "gpt-3.5-turbo",
          messages: historico
        })
      });

      const dados = await resposta.json();
      return dados.choices[0].message.content;
    }

    function enviarImagem() {
      const inputImagem = document.getElementById("imagem-upload");
      const ficheiro = inputImagem.files[0];

      if (ficheiro) {
        const leitor = new FileReader();
        leitor.onload = function(e) {
          const mensagens = document.getElementById("mensagens");
          mensagens.innerHTML += `<div class="mensagem user"><img src="${e.target.result}" alt="Imagem enviada" style="max-width: 200px; border-radius: 8px;"></div>`;
          conversas[conversaAtual].mensagens.push({
            user: "[Imagem enviada]",
            bot: "(O envio de imagens ainda não é suportado como entrada para resposta)"
          });
          mensagens.innerHTML += `<div class="mensagem bot">(Ainda não consigo responder a imagens, mas estou aqui para texto!)</div>`;
          salvarConversas();
          atualizarListaConversas();
        };
        leitor.readAsDataURL(ficheiro);
      }
    }

    function atualizarListaConversas() {
      const lista = document.getElementById("listaConversas");
      lista.innerHTML = "";
      conversas.forEach((conv, index) => {
        let item = document.createElement("li");
        item.innerHTML = `<span>${conv.nome}</span> 
          <span class="edit-btn" onclick="renomearConversa(${index})">✏️</span> 
          <span class="delete-btn" onclick="excluirConversa(${index})">🗑️</span>`;
        item.onclick = () => carregarConversa(index);
        item.className = index === conversaAtual ? "active" : "";
        lista.appendChild(item);
      });
    }

    function carregarConversa(index) {
      conversaAtual = index;
      const mensagens = document.getElementById("mensagens");
      mensagens.innerHTML = "";
      conversas[index].mensagens.forEach(msg => {
        mensagens.innerHTML += `<div class="mensagem user">${msg.user}</div>`;
        mensagens.innerHTML += `<div class="mensagem bot">${msg.bot}</div>`;
      });
      salvarConversas();
      atualizarListaConversas();
    }

    function alternarSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("mostrar");
    }

    atualizarListaConversas();
    carregarConversa(conversaAtual);
  </script>
</body>
</html>
